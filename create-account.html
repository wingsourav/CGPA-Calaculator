<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | CGPA Calculator</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-card">
    <div class="logo">Σ</div>
    <p class="eyebrow">STUDENT PORTAL</p>
    <h1>Create account</h1>
    <p class="intro">Set up your personal space for saving CGPA calculations.</p>
    <form id="createAccountForm">
      <label for="fullName">Full Name</label>
      <input id="fullName" autocomplete="name" required placeholder="Enter your full name">
      <label for="userId">User ID</label>
      <input id="userId" autocomplete="username" required placeholder="Choose a unique user ID">
      <label for="password">Password</label>
      <div class="password-field"><input id="password" type="password" autocomplete="new-password" required minlength="13" pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{13,}" title="Use at least 13 characters, including an uppercase letter, a number, and a special character." placeholder="Create a strong password"><button id="passwordToggle" class="password-toggle" type="button" aria-label="Show password" title="Show password">👁</button></div>
      <small id="passwordHelp" class="password-help">At least 13 characters, with an uppercase letter, number, and special character.</small>
      <p id="message" role="alert"></p>
      <button class="primary" type="submit">Create account</button>
      <button id="backToLogin" class="secondary" type="button">Back to login</button>
    </form>
  </main>
  <script src="create-account.js"></script>
</body>
</html>

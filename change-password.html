<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify User | CGPA Calculator</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-card">
    <div class="logo">Σ</div>
    <p class="eyebrow">STUDENT PORTAL</p>
    <h1>Change password</h1>
    <p class="intro">First, verify the user ID for the account you want to update.</p>
    <form id="verifyUserForm">
      <label for="userId">User ID</label>
      <input id="userId" autocomplete="username" required placeholder="Enter your user ID">
      <p id="message" role="alert"></p>
      <button class="primary" type="submit">Verify user ID</button>
      <button id="backToLogin" class="secondary" type="button">Back to login</button>
    </form>
  </main>
  <script src="change-password.js"></script>
</body>
</html>

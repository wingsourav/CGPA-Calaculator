﻿<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recover Password | CGPA Calculator</title>
    <link rel="stylesheet" href="login.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="auth-image-page">
    <div class="wrapper">
      <button id="backToLogin" class="back-button" type="button">
        <i class="bx bx-arrow-back"></i>
      </button>
      <form id="recoveryForm">
        <h1>Recover Password</h1>
        <div class="input-box">
          <i class="bx bx-id-card"></i>
          <input
            id="userId"
            autocomplete="username"
            required
            placeholder="User ID"
          />
        </div>
        <div class="input-box">
          <i class="bx bx-user"></i>
          <input
            id="fullName"
            autocomplete="name"
            required
            placeholder="Full Name"
          />
        </div>
        <p id="message" role="alert"></p>
        <p id="passwordResult" class="password-result"></p>
        <button class="btn" type="submit">Show password</button>
      </form>
    </div>
    <script src="forgot-password.js"></script>
  </body>
</html>

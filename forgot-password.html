<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recover Password | CGPA Calculator</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-card">
    <div class="logo">Σ</div>
    <p class="eyebrow">STUDENT PORTAL</p>
    <h1>Recover password</h1>
    <p class="intro">Enter the details used when you created your account.</p>
    <form id="recoveryForm">
      <label for="userId">User ID</label>
      <input id="userId" autocomplete="username" required placeholder="Enter your user ID">
      <label for="fullName">Full Name</label>
      <input id="fullName" autocomplete="name" required placeholder="Enter your registered full name">
      <p id="message" role="alert"></p>
      <p id="passwordResult" class="password-result"></p>
      <button class="primary" type="submit">Show password</button>
      <button id="backToLogin" class="secondary" type="button">Back to login</button>
    </form>
  </main>
  <script src="forgot-password.js"></script>
</body>
</html>

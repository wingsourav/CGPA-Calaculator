﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | CGPA Calculator</title>
  <link rel="stylesheet" href="login.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="auth-image-page">
    <div class="wrapper">
    <button id="backToLogin" class="back-button" type="button"><i class='bx bx-arrow-back'></i></button>
    <form id="changePasswordForm">
      <h1>Set New Password</h1>
      <div class="input-box">
        <i class="bx bx-lock-alt"></i>
        <input id="oldPassword" type="password" autocomplete="current-password" required placeholder="Current Password">
        <button id="oldPasswordToggle" class="password-toggle" type="button" aria-label="Show password" title="Show password">
          <i class="bx bx-hide" id="oldPasswordToggleIcon"></i>
        </button>
      </div>
      <div class="input-box">
        <i class="bx bx-lock-alt"></i>
        <input id="newPassword" type="password" autocomplete="new-password" required minlength="8" pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}" title="Use at least 8 characters, including an uppercase letter, a number, and a special character." placeholder="New Password">
        <button id="newPasswordToggle" class="password-toggle" type="button" aria-label="Show password" title="Show password">
          <i class="bx bx-hide" id="newPasswordToggleIcon"></i>
        </button>
      </div>
      <small id="passwordHelp" class="password-help">At least 8 characters, with an uppercase letter, number, and special character.</small>
      <div class="input-box">
        <i class="bx bx-lock-alt"></i>
        <input id="confirmPassword" type="password" autocomplete="new-password" required placeholder="Confirm New Password">
        <button id="confirmPasswordToggle" class="password-toggle" type="button" aria-label="Show password" title="Show password">
          <i class="bx bx-hide" id="confirmPasswordToggleIcon"></i>
        </button>
      </div>
      <p id="message" role="alert"></p>
      <button class="btn" type="submit">Change password</button>
    </form>
  </div>
  <script src="change-password-form.js"></script>
</body>
</html>

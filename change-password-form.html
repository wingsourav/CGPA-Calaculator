<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | CGPA Calculator</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-card">
    <div class="logo">Σ</div>
    <p class="eyebrow">STUDENT PORTAL</p>
    <h1>Set new password</h1>
    <p class="intro">Enter your current password and choose a secure new password.</p>
    <form id="changePasswordForm">
      <label for="oldPassword">Old Password</label>
      <div class="password-field"><input id="oldPassword" type="password" autocomplete="current-password" required placeholder="Enter current password"><button class="password-toggle" type="button" aria-label="Show password">👁</button></div>
      <label for="newPassword">New Password</label>
      <div class="password-field"><input id="newPassword" type="password" autocomplete="new-password" required minlength="13" placeholder="Create a strong password"><button class="password-toggle" type="button" aria-label="Show password">👁</button></div>
      <small id="passwordHelp" class="password-help">At least 13 characters, with an uppercase letter, number, and special character.</small>
      <label for="confirmPassword">Confirm New Password</label>
      <div class="password-field"><input id="confirmPassword" type="password" autocomplete="new-password" required placeholder="Re-enter new password"><button class="password-toggle" type="button" aria-label="Show password">👁</button></div>
      <p id="message" role="alert"></p>
      <button class="primary" type="submit">Change password</button>
      <button id="backToLogin" class="secondary" type="button">Back to login</button>
    </form>
  </main>
  <script src="change-password-form.js"></script>
</body>
</html>
